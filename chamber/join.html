        content="Join the Krugersdorp Chamber of Commerce Today">

        content="https://donaldmwana.github.io/wdd131/project/images/chamber-social.jpg">

        content="https://donaldmwana.github.io/wdd131/project/join.html">

    <!-- FAVICON -->
    <link rel="icon" href="images/favicon.ico">

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

<header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="directory.html">Directory</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="join.html">Join</a></li>
        </ul>
    </nav>
</header>

<main>

    <h1>Chamber Membership Application</h1>

    <form method="get" action="thankyou.html">

        <label for="fname">First Name</label>
        <input id="fname" name="fname" type="text" required>

        <label for="lname">Last Name</label>
        <input id="lname" name="lname" type="text" required>

        <label for="orgtitle">Organization Title</label>
        <input id="orgtitle" name="orgtitle" type="text">

        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" required>

        <label for="phone">Mobile Phone</label>
        <input id="phone" name="phone" type="tel" required>

        <label for="orgname">Organization Name</label>
        <input id="orgname" name="orgname" type="text" required>

        <label for="membership">Membership Level</label>
        <select id="membership" name="membership">
            <option value="np">NP Membership</option>
            <option value="bronze">Bronze Membership</option>
            <option value="silver">Silver Membership</option>
            <option value="gold">Gold Membership</option>
        </select>

        <label for="description">Organization Description</label>
        <textarea id="description" name="description"></textarea>

        <!-- TIMESTAMP -->
        <input type="hidden" id="timestamp" name="timestamp">

        <button type="submit">Submit Application</button>

    </form>

</main>

<footer>
    <p>&copy; <span id="year"></span> Krugersdorp Chamber of Commerce</p>
    <p>Last Modified: <span id="lastModified"></span></p>
</footer>

</body>
