<main>

<h1>Chamber Membership Application</h1>

<form method="get" action="thankyou.html">

    <!-- First Name -->
    <label for="fname">First Name
        <input id="fname" name="fname" type="text" required
            autocomplete="given-name"
            title="Enter your first name">
    </label>

    <!-- Last Name -->
    <label for="lname">Last Name
        <input id="lname" name="lname" type="text" required
            autocomplete="family-name"
            title="Enter your last name">
    </label>

    <!-- Organization Title -->
    <label for="orgtitle">Organization Title
        <input id="orgtitle" name="orgtitle" type="text"
            autocomplete="organization-title"
            pattern="[A-Za-z\\-\\s]{7,}"
            title="Minimum 7 characters. Letters, spaces, and hyphens only.">
    </label>

    <!-- Email -->
    <label for="email">Email Address
        <input id="email" name="email" type="email" required
            autocomplete="email"
            placeholder="name@example.com"
            title="Enter a valid email address">
    </label>

    <!-- Phone -->
    <label for="phone">Mobile Phone
        <input id="phone" name="phone" type="tel" required
            autocomplete="tel"
            placeholder="+27 123 456 789"
            title="Enter your mobile phone number">
    </label>

    <!-- Organization Name -->
    <label for="orgname">Organization Name
        <input id="orgname" name="orgname" type="text" required
            autocomplete="organization"
            title="Enter your business or organization name">
    </label>

    <!-- Membership Level -->
    <label for="membership">Membership Level
        <select id="membership" name="membership">
            <option value="np">NP Membership</option>
            <option value="bronze">Bronze Membership</option>
            <option value="silver">Silver Membership</option>
            <option value="gold">Gold Membership</option>
        </select>
    </label>

    <!-- Organization Description -->
    <label for="description">Organization Description
        <textarea id="description" name="description"
            title="Describe your organization"></textarea>
    </label>

    <!-- Timestamp -->
    <input type="hidden" id="timestamp" name="timestamp">

    <button type="submit">Submit Application</button>

</form>

</main>
